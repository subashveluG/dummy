<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSizzle | Login</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container d-flex justify-content-center py-3">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <img src="assets/img/logo.png" alt="ShopSizzle Logo" height="40" style="object-fit: contain;">
                <span class="fw-bolder fs-3 text-gradient">ShopSizzle</span>
            </a>
        </div>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <!-- Theme Toggle -->
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                <i class="bi bi-moon-fill" style="pointer-events: none;"></i>
            </button>
            <a href="index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-house"></i> Back to
                Home</a>
        </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="container d-flex justify-content-center">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted small">Enter your credentials to access your account</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent text-muted"><i
                                    class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label class="form-label fw-bold small">Password</label>
                            <a href="#" class="small text-decoration-none">Forgot password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent text-muted"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small" for="rememberMe">Remember me</label>
                    </div>
                    <button type="submit" class="btn-custom w-100 justify-content-center">Sign In</button>
                </form>

                <div class="position-relative mt-4 mb-3 text-center">
                    <hr class="text-muted">
                    <span class="position-absolute top-50 start-50 translate-middle px-2 small text-muted"
                        style="background-color: var(--bg-color);">Or continue with</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn"><i class="bi bi-google text-danger"></i> Google</button>
                    <button type="button" class="social-btn"><i class="bi bi-facebook text-primary"></i>
                        Facebook</button>
                </div>

                <p class="text-center mt-4 mb-0 small text-muted">Don't have an account? <a href="signup.html"
                        class="fw-bold text-decoration-none">Sign up</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
